<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chummy Games — Secret Hitler</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --card-hover: #1a2744;
  --accent: #e94560;
  --accent2: #0f3460;
  --gold: #f5c518;
  --liberal: #2196F3;
  --fascist: #e94560;
  --text: #eee;
  --text-dim: #8899aa;
  --green: #4caf50;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; overflow-x: hidden; }
body { display: flex; flex-direction: column; align-items: center; }

#app { width: 100%; max-width: 520px; min-height: 100vh; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
#app.host-mode { max-width: 1400px; }
#app.admin-mode { max-width: 900px; }

h1 { font-family: 'Cinzel', serif; color: var(--accent); font-size: 1.6em; text-align: center; letter-spacing: 2px; }
h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.2em; text-align: center; }
h3 { font-family: 'Cinzel', serif; color: var(--text); font-size: 1em; }

.card { background: var(--card); border-radius: var(--radius); padding: 16px; border: 1px solid rgba(255,255,255,.06); }
.card:hover { background: var(--card-hover); }

input[type="text"] {
  width: 100%; padding: 12px 16px; border-radius: var(--radius); border: 2px solid var(--accent2);
  background: rgba(0,0,0,.3); color: var(--text); font-size: 1em; outline: none;
  font-family: 'Source Sans 3', sans-serif;
}
input[type="text"]:focus { border-color: var(--accent); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 24px; border: none; border-radius: var(--radius); cursor: pointer;
  font-family: 'Source Sans 3', sans-serif; font-weight: 700; font-size: .95em;
  transition: transform .15s, box-shadow .15s; text-transform: uppercase; letter-spacing: 1px;
}
.btn:active { transform: scale(.96); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { box-shadow: 0 0 20px rgba(233,69,96,.4); }
.btn-secondary { background: var(--accent2); color: #fff; }
.btn-liberal { background: var(--liberal); color: #fff; }
.btn-fascist { background: var(--fascist); color: #fff; }
.btn-gold { background: var(--gold); color: #111; }
.btn-green { background: var(--green); color: #fff; }
.btn-danger { background: #c0392b; color: #fff; }
.btn-ghost { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
.btn-sm { padding: 8px 14px; font-size: .8em; }
.btn-full { width: 100%; }
.btn[disabled] { opacity: .4; pointer-events: none; }
.btn.selected { box-shadow: 0 0 0 3px var(--gold), 0 0 16px rgba(245,197,24,.4); transform: scale(1.04); }

.flex { display: flex; gap: 10px; align-items: center; }
.flex-wrap { flex-wrap: wrap; }
.flex-col { flex-direction: column; }
.flex-center { justify-content: center; }
.gap-sm { gap: 6px; }
.gap-lg { gap: 16px; }
.mt { margin-top: 12px; }
.mb { margin-bottom: 12px; }
.text-center { text-align: center; }
.text-dim { color: var(--text-dim); }
.text-red { color: var(--accent); }
.text-blue { color: var(--liberal); }
.text-gold { color: var(--gold); }
.text-green { color: var(--green); }
.text-sm { font-size: .85em; }

.badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: .75em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.badge-vip { background: var(--gold); color: #111; }
.badge-pres { background: var(--liberal); color: #fff; }
.badge-chan { background: var(--gold); color: #111; }
.badge-dead { background: #555; color: #ccc; text-decoration: line-through; }
.badge-fascist { background: var(--fascist); color: #fff; }
.badge-liberal { background: var(--liberal); color: #fff; }
.badge-hitler { background: #111; color: var(--accent); border: 1px solid var(--accent); }

.player-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; background: rgba(0,0,0,.2); }
.player-row .name { font-weight: 700; flex: 1; }
.player-row .badges { display: flex; gap: 4px; flex-wrap: wrap; }

.room-card { cursor: pointer; transition: transform .15s; }
.room-card:hover { transform: translateY(-2px); }
.room-card .room-name { font-family: 'Cinzel', serif; font-size: 1.1em; color: var(--gold); }
.room-card .room-info { color: var(--text-dim); font-size: .85em; margin-top: 4px; }
.room-card .rejoin { color: var(--green); font-weight: 700; }

.identity-card { text-align: center; padding: 20px; border-radius: var(--radius); cursor: pointer; user-select: none; }
.identity-card img { max-width: 120px; border-radius: 8px; }

.policy-img { width: 70px; height: auto; border-radius: 6px; cursor: pointer; border: 3px solid transparent; transition: border .15s, transform .15s; }
.policy-img:hover { transform: scale(1.05); }
.policy-img.selected { border-color: var(--gold); transform: scale(1.08); box-shadow: 0 0 12px rgba(245,197,24,.5); }

.vote-img { width: 90px; height: auto; border-radius: 8px; cursor: pointer; border: 3px solid transparent; transition: all .15s; }
.vote-img:hover { transform: scale(1.05); }
.vote-img.selected { border-color: var(--gold); box-shadow: 0 0 16px rgba(245,197,24,.5); }

.board-container { position: relative; width: 100%; overflow-x: auto; }
.board-container img.board-bg { width: 100%; display: block; }

.score-bar { display: flex; gap: 4px; align-items: center; }
.score-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: .7em; font-weight: 700; }
.score-dot.filled-f { background: var(--fascist); border-color: var(--fascist); }
.score-dot.filled-l { background: var(--liberal); border-color: var(--liberal); }

.admin-table { width: 100%; border-collapse: collapse; }
.admin-table th, .admin-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.1); }
.admin-table th { color: var(--gold); font-size: .85em; text-transform: uppercase; letter-spacing: 1px; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--accent); padding: 12px 24px; border-radius: var(--radius); z-index: 999; animation: fadeInUp .3s; }
@keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

.loader { text-align: center; padding: 40px; color: var(--text-dim); }

/* Host/TV mode */
.host-board { display: flex; gap: 20px; flex-wrap: wrap; }
.host-players { flex: 1; min-width: 280px; }
.host-game { flex: 2; min-width: 400px; }

@media (max-width: 600px) {
  #app { padding: 10px; }
  h1 { font-size: 1.3em; }
  .policy-img { width: 55px; }
  .vote-img { width: 70px; }
  .btn { padding: 10px 16px; font-size: .85em; }
  .score-dot { width: 22px; height: 22px; font-size: .6em; }
}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// FIREBASE + PCID INIT
// ═══════════════════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey: "AIzaSyDVbt_8GuRuHJRPAN7jFXbs_lJUfUHNxHE",
  authDomain: "chummy-games.firebaseapp.com",
  databaseURL: "https://chummy-games-default-rtdb.firebaseio.com",
  projectId: "chummy-games",
  storageBucket: "chummy-games.firebasestorage.app",
  messagingSenderId: "869241598273",
  appId: "1:869241598273:web:d97492b7308f785c37f1c0"
});
const db = firebase.database();

function getOrCreatePCID() {
  const k = 'ChummyGames-PC-ID';
  let id = localStorage.getItem(k);
  if (!id || id.length !== 12) {
    id = Array.from({ length: 12 }, () =>
      'ABCDEFGHIJKLMNOPQRSTUVWXYZ'[Math.floor(Math.random() * 26)]
    ).join('');
    localStorage.setItem(k, id);
  }
  return id;
}
const myPCID = getOrCreatePCID();

const IMG = 'images/';
const AUD = 'audio/';
const app = document.getElementById('app');

// ═══════════════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════════════
let audioMuted = true;
function playAudio(name) {
  if (audioMuted) return;
  try { new Audio(AUD + name + '.m4a').play(); } catch(e){}
}
function buzz() {
  if (navigator.vibrate) navigator.vibrate(100);
}

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let myName = '';
let currentRoom = null; // roomId
let currentRoomData = null;
let activeListeners = [];
let isAdmin = false;
let isHostView = false;
let hostViewRoomId = null;

// ═══════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════
function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function createDrawPolicyPile() {
  let pile = [];
  for (let i = 0; i < 11; i++) pile.push('FASCIST');
  for (let i = 0; i < 6; i++) pile.push('LIBERAL');
  return shuffle(shuffle(pile));
}

function identityList(count) {
  let lst = [];
  for (let i = 0; i < count; i++) {
    if (i === 0) lst.push('Hitler');
    else if (i === 1 || i === 6 || i === 8) lst.push('Fascist');
    else lst.push('Liberal');
  }
  return shuffle(shuffle(shuffle(lst)));
}

function genRoomId() {
  return Array.from({ length: 6 }, () => 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random() * 36)]).join('');
}

function clearListeners() {
  activeListeners.forEach(l => l());
  activeListeners = [];
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function getPlayerArray(roomData) {
  if (!roomData || !roomData.players) return [];
  const order = roomData.playerOrder || [];
  const players = roomData.players;
  // sort by order array
  let arr = [];
  for (const pcid of order) {
    if (players[pcid]) arr.push({ ...players[pcid], pcid });
  }
  // add any not in order
  for (const pcid in players) {
    if (!order.includes(pcid)) arr.push({ ...players[pcid], pcid });
  }
  return arr;
}

function getMe(roomData) {
  if (!roomData || !roomData.players) return null;
  return roomData.players[myPCID] || null;
}

function getPresident(arr) { return arr.find(p => p.president) || null; }
function getChancellor(arr) { return arr.find(p => p.chancellor) || null; }
function getVIP(arr) { return arr.find(p => p.vip) || null; }

// ═══════════════════════════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════════════════════════
function route() {
  clearListeners();
  const hash = location.hash.replace('#', '');

  if (hash === 'admin') {
    isAdmin = true;
    isHostView = false;
    app.className = 'admin-mode';
    showAdmin();
    return;
  }

  if (hash.startsWith('host/')) {
    isHostView = true;
    isAdmin = false;
    hostViewRoomId = hash.split('/')[1];
    app.className = 'host-mode';
    showHostView();
    return;
  }

  isAdmin = false;
  isHostView = false;
  app.className = '';

  // check if player has a name
  db.ref('players/' + myPCID).once('value').then(snap => {
    const data = snap.val();
    if (!data || !data.name) {
      showNameEntry();
    } else {
      myName = data.name;
      if (hash.startsWith('room/')) {
        currentRoom = hash.split('/')[1];
        enterRoom(currentRoom);
      } else {
        showLobby();
      }
    }
  });
}

window.addEventListener('hashchange', route);

// ═══════════════════════════════════════════════════════════════════
// SCREEN: NAME ENTRY
// ═══════════════════════════════════════════════════════════════════
function showNameEntry(msg) {
  app.innerHTML = `
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px;">
      <h1>Chummy Games</h1>
      <h2>Secret Hitler</h2>
      <div class="card flex-col gap-lg" style="margin-top:20px;">
        ${msg ? `<div class="text-red text-center">${msg}</div>` : ''}
        <div class="text-center text-dim text-sm">PCID: ${myPCID}</div>
        <label style="color:var(--text-dim);font-size:.85em;">Choose your display name</label>
        <input type="text" id="nameInput" placeholder="Enter name..." maxlength="20" autofocus>
        <button class="btn btn-primary btn-full" onclick="submitName()">Enter</button>
      </div>
    </div>`;
  document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitName(); });
}

async function submitName() {
  const input = document.getElementById('nameInput');
  const name = (input.value || '').trim().replace(/\s+/g, '');
  if (!name) return toast('Name cannot be blank');
  if (name.toLowerCase() === 'host') return toast('Name cannot be Host');

  await db.ref('players/' + myPCID).set({ name, createdAt: Date.now() });
  myName = name;
  location.hash = '#lobby';
}

// ═══════════════════════════════════════════════════════════════════
// SCREEN: LOBBY
// ═══════════════════════════════════════════════════════════════════
function showLobby() {
  currentRoom = null;
  app.innerHTML = `
    <h1>Chummy Games</h1>
    <div class="flex" style="justify-content:space-between;align-items:center;">
      <div>
        <span class="text-dim text-sm">Playing as</span>
        <strong style="margin-left:6px;">${myName}</strong>
        <button class="btn btn-ghost btn-sm" style="margin-left:8px;" onclick="showChangeName()">Change</button>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="toggleMute()" id="muteBtn">${audioMuted ? '🔇' : '🔊'}</button>
    </div>
    <div class="card flex gap-sm" style="align-items:stretch;">
      <input type="text" id="newRoomName" placeholder="Room name (optional)" maxlength="30" style="flex:1;">
      <button class="btn btn-primary" onclick="createRoom()">Create Room</button>
    </div>
    <h3 style="margin-top:8px;">Available Rooms</h3>
    <div id="roomList" class="loader">Loading rooms...</div>
  `;

  const ref = db.ref('rooms');
  const cb = ref.on('value', snap => {
    const rooms = snap.val() || {};
    const container = document.getElementById('roomList');
    if (!container) return;

    const roomEntries = Object.entries(rooms).sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0));

    if (roomEntries.length === 0) {
      container.innerHTML = '<div class="text-dim text-center" style="padding:20px;">No rooms yet. Create one!</div>';
      return;
    }

    container.innerHTML = '';
    for (const [id, room] of roomEntries) {
      const players = room.players ? Object.keys(room.players) : [];
      const count = players.length;
      const gs = room.gameState || 'Login';
      const isMyRoom = players.includes(myPCID);
      const started = gs !== 'Login';

      // Show room if: not started OR I'm in it
      if (started && !isMyRoom) continue;

      const div = document.createElement('div');
      div.className = 'card room-card';
      div.innerHTML = `
        <div class="room-name">${room.name || id}</div>
        <div class="room-info">
          ${count} player${count !== 1 ? 's' : ''} · ${started ? 'In Progress' : 'Waiting'}
          ${isMyRoom ? '<span class="rejoin"> · Rejoin</span>' : ''}
        </div>
        <div class="text-dim text-sm" style="margin-top:2px;">ID: ${id}</div>`;
      div.onclick = () => { location.hash = '#room/' + id; };
      container.appendChild(div);
    }
  });
  activeListeners.push(() => ref.off('value', cb));
}

function toggleMute() {
  audioMuted = !audioMuted;
  const btn = document.getElementById('muteBtn');
  if (btn) btn.textContent = audioMuted ? '🔇' : '🔊';
}

function showChangeName() {
  const card = document.createElement('div');
  card.className = 'card flex-col gap-sm';
  card.style.position = 'fixed';
  card.style.top = '50%';
  card.style.left = '50%';
  card.style.transform = 'translate(-50%,-50%)';
  card.style.zIndex = '1000';
  card.style.minWidth = '280px';
  card.style.boxShadow = '0 0 40px rgba(0,0,0,.8)';
  card.innerHTML = `
    <h3>Change Name</h3>
    <input type="text" id="changeNameInput" value="${myName}" maxlength="20">
    <div class="flex gap-sm">
      <button class="btn btn-primary btn-sm" onclick="doChangeName()">Save</button>
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.card').remove()">Cancel</button>
    </div>`;
  document.body.appendChild(card);
  document.getElementById('changeNameInput').focus();
}

async function doChangeName() {
  const input = document.getElementById('changeNameInput');
  const name = (input.value || '').trim().replace(/\s+/g, '');
  if (!name) return toast('Name cannot be blank');
  if (name.toLowerCase() === 'host') return toast('Name cannot be Host');

  await db.ref('players/' + myPCID + '/name').set(name);
  myName = name;

  // Update name in any rooms I'm in
  const snap = await db.ref('rooms').once('value');
  const rooms = snap.val() || {};
  const updates = {};
  for (const [rid, room] of Object.entries(rooms)) {
    if (room.players && room.players[myPCID]) {
      updates[`rooms/${rid}/players/${myPCID}/name`] = name;
    }
  }
  if (Object.keys(updates).length > 0) await db.ref().update(updates);

  input.closest('.card').remove();
  toast('Name updated!');
  route();
}

async function createRoom() {
  const nameInput = document.getElementById('newRoomName');
  const rName = (nameInput.value || '').trim() || 'Room ' + genRoomId().substring(0, 4);
  const roomId = genRoomId();

  await db.ref('rooms/' + roomId).set({
    name: rName,
    createdAt: Date.now(),
    gameState: 'Login',
    fascistScore: 0,
    liberalScore: 0,
    voteRetryCount: 1,
    toBeChancellorName: '',
    gameElement: '',
    fascistBoardImage: '',
    presidentVeto: false,
    chancellorVeto: false,
    drawPolicyPile: createDrawPolicyPile(),
    discardPolicyPile: [],
    playerOrder: [],
    players: {}
  });

  location.hash = '#room/' + roomId;
}

// ═══════════════════════════════════════════════════════════════════
// ENTER ROOM
// ═══════════════════════════════════════════════════════════════════
async function enterRoom(roomId) {
  currentRoom = roomId;
  app.innerHTML = '<div class="loader">Joining room...</div>';

  const snap = await db.ref('rooms/' + roomId).once('value');
  if (!snap.exists()) {
    toast('Room not found');
    location.hash = '#lobby';
    return;
  }

  const room = snap.val();
  const gs = room.gameState || 'Login';
  const players = room.players || {};
  const playerOrder = room.playerOrder || [];

  // If I'm not in the room yet
  if (!players[myPCID]) {
    if (gs !== 'Login') {
      toast('Game already started');
      location.hash = '#lobby';
      return;
    }
    // Check name collision
    for (const pcid in players) {
      if (players[pcid].name === myName && pcid !== myPCID) {
        toast('Name already in use in this room');
        location.hash = '#lobby';
        return;
      }
    }
    const isVip = playerOrder.length === 0 && Object.keys(players).length === 0;
    await db.ref('rooms/' + roomId + '/players/' + myPCID).set({
      name: myName,
      vip: isVip,
      identity: 'Liberal',
      inGameStatus: 'InGame',
      president: false,
      chancellor: false,
      vote: 'null'
    });
    const newOrder = [...playerOrder, myPCID];
    await db.ref('rooms/' + roomId + '/playerOrder').set(newOrder);
  }

  // Listen to room changes
  const ref = db.ref('rooms/' + roomId);
  const cb = ref.on('value', snap => {
    if (!snap.exists()) {
      toast('Room was deleted');
      location.hash = '#lobby';
      return;
    }
    currentRoomData = snap.val();
    renderRoom(roomId, currentRoomData);
  });
  activeListeners.push(() => ref.off('value', cb));
}

// ═══════════════════════════════════════════════════════════════════
// RENDER ROOM (PLAYER VIEW)
// ═══════════════════════════════════════════════════════════════════
function renderRoom(roomId, room) {
  const gs = room.gameState || 'Login';
  const players = getPlayerArray(room);
  const me = getMe(room);

  if (!me) {
    app.innerHTML = '<div class="loader">Reconnecting...</div>';
    enterRoom(roomId);
    return;
  }

  if (gs === 'Login') {
    renderLobbyWait(roomId, room, players, me);
  } else {
    renderGamePlayer(roomId, room, players, me);
  }
}

// ═══════════════════════════════════════════════════════════════════
// LOBBY WAIT (in room, game not started)
// ═══════════════════════════════════════════════════════════════════
function renderLobbyWait(roomId, room, players, me) {
  let html = `
    <div class="flex" style="justify-content:space-between;align-items:center;">
      <h2>${room.name || roomId}</h2>
      <button class="btn btn-ghost btn-sm" onclick="leaveRoom('${roomId}')">Leave</button>
    </div>
    <div class="text-dim text-sm text-center">Room: ${roomId} · Host view: <a href="#host/${roomId}" style="color:var(--gold);">#host/${roomId}</a></div>
    <div class="text-center text-dim">Waiting for players... (${players.length}/10)</div>`;

  html += '<div class="flex-col gap-sm">';
  for (const p of players) {
    html += `<div class="player-row">
      <div class="name">${p.name}${p.pcid === myPCID ? ' (You)' : ''}</div>
      <div class="badges">${p.vip ? '<span class="badge badge-vip">VIP</span>' : ''}</div>
    </div>`;
  }
  html += '</div>';

  if (me.vip && players.length >= 5) {
    html += `<button class="btn btn-primary btn-full mt" onclick="startGame('${roomId}')">Start Game (${players.length} players)</button>`;
  } else if (me.vip) {
    html += `<div class="text-center text-dim mt">Need at least 5 players to start (have ${players.length})</div>`;
  } else {
    html += `<div class="text-center text-dim mt">Waiting for VIP to start...</div>`;
  }

  html += `<button class="btn btn-sm btn-secondary" onclick="toggleMute()" id="muteBtn" style="align-self:center;margin-top:8px;">${audioMuted ? '🔇 Unmute' : '🔊 Mute'}</button>`;

  app.innerHTML = html;
}

async function leaveRoom(roomId) {
  const snap = await db.ref('rooms/' + roomId).once('value');
  if (!snap.exists()) { location.hash = '#lobby'; return; }
  const room = snap.val();
  if (room.gameState !== 'Login') {
    toast("Can't leave during a game");
    return;
  }
  const order = (room.playerOrder || []).filter(p => p !== myPCID);
  const updates = {};
  updates['rooms/' + roomId + '/players/' + myPCID] = null;
  updates['rooms/' + roomId + '/playerOrder'] = order;

  // If I was VIP, assign to next
  if (room.players[myPCID] && room.players[myPCID].vip && order.length > 0) {
    updates['rooms/' + roomId + '/players/' + order[0] + '/vip'] = true;
  }
  await db.ref().update(updates);
  location.hash = '#lobby';
}

// ═══════════════════════════════════════════════════════════════════
// START GAME
// ═══════════════════════════════════════════════════════════════════
async function startGame(roomId) {
  const snap = await db.ref('rooms/' + roomId).once('value');
  const room = snap.val();
  const players = getPlayerArray(room);
  const order = room.playerOrder || [];

  if (players.length < 5) return toast('Need 5+ players');

  const pile = createDrawPolicyPile();
  const identities = identityList(players.length);
  const randPres = Math.floor(Math.random() * players.length);

  let boardImg = '';
  if (players.length < 7) boardImg = 'FascistBoard_5';
  else if (players.length < 9) boardImg = 'FascistBoard_7';
  else boardImg = 'FascistBoard_9';

  const updates = {};
  updates[`rooms/${roomId}/gameState`] = 'ChooseChancellor';
  updates[`rooms/${roomId}/fascistScore`] = 0;
  updates[`rooms/${roomId}/liberalScore`] = 0;
  updates[`rooms/${roomId}/voteRetryCount`] = 1;
  updates[`rooms/${roomId}/toBeChancellorName`] = '';
  updates[`rooms/${roomId}/gameElement`] = '';
  updates[`rooms/${roomId}/fascistBoardImage`] = boardImg;
  updates[`rooms/${roomId}/presidentVeto`] = false;
  updates[`rooms/${roomId}/chancellorVeto`] = false;
  updates[`rooms/${roomId}/drawPolicyPile`] = pile;
  updates[`rooms/${roomId}/discardPolicyPile`] = [];

  for (let i = 0; i < order.length; i++) {
    const pcid = order[i];
    updates[`rooms/${roomId}/players/${pcid}/identity`] = identities[i];
    updates[`rooms/${roomId}/players/${pcid}/inGameStatus`] = 'InGame';
    updates[`rooms/${roomId}/players/${pcid}/president`] = i === randPres;
    updates[`rooms/${roomId}/players/${pcid}/chancellor`] = false;
    updates[`rooms/${roomId}/players/${pcid}/vote`] = 'null';
  }

  await db.ref().update(updates);
  playAudio('ChooseChancellor');
}

// GAME ACTIONS
// ═══════════════════════════════════════════════════════════════════
async function submitChancellor(roomId) {
  if (!_selectedPlayerName) return;
  const name = _selectedPlayerName;
  _selectedPlayerName = null;
  buzz();
  playAudio('VoteChancellor');

  const snap = await db.ref('rooms/' + roomId).once('value');
  const room = snap.val();
  const order = room.playerOrder || [];
  const updates = {};

  // Reset all votes
  for (const pcid of order) {
    updates[`rooms/${roomId}/players/${pcid}/vote`] = 'null';
  }
  updates[`rooms/${roomId}/toBeChancellorName`] = name;
  updates[`rooms/${roomId}/gameState`] = 'VoteChancellor';

  await db.ref().update(updates);
}

async function submitVote(roomId) {
  if (!_selectedVote) return;
  const vote = _selectedVote;
  _selectedVote = null;
  buzz();

  await db.ref(`rooms/${roomId}/players/${myPCID}/vote`).set(vote);

  // Check if all votes are in
  const snap = await db.ref('rooms/' + roomId).once('value');
  const room = snap.val();
  const players = getPlayerArray(room);

  let deadCount = 0, jaCount = 0, neinCount = 0;
  for (const p of players) {
    if (p.inGameStatus === 'Dead') deadCount++;
    if (p.vote === 'ja') jaCount++;
    if (p.vote === 'nein') neinCount++;
  }

  if (deadCount + jaCount + neinCount === players.length) {
    await processVoteResult(roomId, room, players, jaCount, neinCount);
  }
}

async function processVoteResult(roomId, room, players, jaCount, neinCount) {
  const updates = {};
  const order = room.playerOrder || [];
  let pile = [...(room.drawPolicyPile || [])];
  let discard = [...(room.discardPolicyPile || [])];
  let fScore = room.fascistScore || 0;
  let lScore = room.liberalScore || 0;
  let voteRetry = room.voteRetryCount || 1;
  const chanName = room.toBeChancellorName;

  if (jaCount > neinCount) {
    // Set chancellor
    for (const pcid of order) {
      if (room.players[pcid].name === chanName) {
        updates[`rooms/${roomId}/players/${pcid}/chancellor`] = true;
      }
    }

    // Check if Hitler elected chancellor with fascist score > 3
    if (fScore >= 3) {
      const chanPlayer = players.find(p => p.name === chanName);
      if (chanPlayer && chanPlayer.identity === 'Hitler') {
        updates[`rooms/${roomId}/gameState`] = 'GameEndFASCIST';
        await db.ref().update(updates);
        return;
      }
    }

    updates[`rooms/${roomId}/gameState`] = 'RemovePolicy';
    updates[`rooms/${roomId}/voteRetryCount`] = 0;
  } else {
    // Failed vote
    voteRetry++;
    let nextState = 'ChooseChancellor';

    if (voteRetry > 3) {
      voteRetry = 0;
      if (pile.length > 0) {
        const topPolicy = pile.pop();
        discard.push(topPolicy);

        if (topPolicy === 'FASCIST') fScore++;
        else lScore++;

        updates[`rooms/${roomId}/drawPolicyPile`] = pile;
        updates[`rooms/${roomId}/discardPolicyPile`] = discard;
        updates[`rooms/${roomId}/fascistScore`] = fScore;
        updates[`rooms/${roomId}/liberalScore`] = lScore;

        if (lScore >= 5) {
          updates[`rooms/${roomId}/gameState`] = 'GameEndLIBERAL';
          updates[`rooms/${roomId}/voteRetryCount`] = voteRetry;
          await db.ref().update(updates);
          return;
        }
        if (fScore >= 6) {
          updates[`rooms/${roomId}/gameState`] = 'GameEndFASCIST';
          updates[`rooms/${roomId}/voteRetryCount`] = voteRetry;
          await db.ref().update(updates);
          return;
        }

        // Check special action
        const special = checkSpecialAction(fScore, players.length);
        if (special && topPolicy === 'FASCIST') {
          nextState = special;
        }

        if (pile.length < 3) {
          pile = shuffle(shuffle(discard)).concat(pile);
          discard = [];
          updates[`rooms/${roomId}/drawPolicyPile`] = pile;
          updates[`rooms/${roomId}/discardPolicyPile`] = discard;
        }
      }
    }

    updates[`rooms/${roomId}/voteRetryCount`] = voteRetry;

    if (nextState === 'ChooseChancellor') {
      setNextPresident(updates, roomId, room, '');
    }
    updates[`rooms/${roomId}/gameState`] = nextState;
    updates[`rooms/${roomId}/toBeChancellorName`] = '';
  }

  await db.ref().update(updates);
}

function checkSpecialAction(fScore, playerCount) {
  if ((playerCount === 7 || playerCount === 8) && fScore === 2) return 'ChooseExaminPlayer';
  if (playerCount >= 9 && (fScore === 1 || fScore === 2)) return 'ChooseExaminPlayer';
  if (playerCount < 7 && fScore === 3) return 'ExaminPolicy';
  if (playerCount >= 7 && fScore === 3) return 'ChoosePresidentPlayer';
  if (fScore === 4 || fScore === 5) return 'ChooseKillPlayer';
  return null;
}

function setNextPresident(updates, roomId, room, specificName) {
  const order = room.playerOrder || [];
  const players = room.players || {};
  let presIdx = -1;

  // Find current president
  for (let i = 0; i < order.length; i++) {
    const pcid = order[i];
    if (players[pcid] && players[pcid].president) {
      updates[`rooms/${roomId}/players/${pcid}/president`] = false;
      if (!specificName) presIdx = i + 1;
    }
    if (players[pcid] && players[pcid].chancellor) {
      updates[`rooms/${roomId}/players/${pcid}/chancellor`] = false;
    }
  }

  if (specificName) {
    for (let i = 0; i < order.length; i++) {
      if (players[order[i]] && players[order[i]].name === specificName) {
        presIdx = i;
        break;
      }
    }
  }

  if (presIdx >= order.length) presIdx = 0;
  if (presIdx < 0) presIdx = 0;

  // Skip dead players
  let tries = 0;
  while (players[order[presIdx]] && players[order[presIdx]].inGameStatus === 'Dead' && tries < order.length) {
    presIdx++;
    if (presIdx >= order.length) presIdx = 0;
    tries++;
  }

  updates[`rooms/${roomId}/players/${order[presIdx]}/president`] = true;
}

async function submitRemovePolicy(roomId) {
  if (_selectedPolicyIdx === null) return;
  const idx = _selectedPolicyIdx;
  _selectedPolicyIdx = null;
  buzz();

  const snap = await db.ref('rooms/' + roomId).once('value');
  const room = snap.val();
  let pile = [...(room.drawPolicyPile || [])];
  let discard = [...(room.discardPolicyPile || [])];
  const fScore = room.fascistScore || 0;

  const removed = pile.splice(idx, 1)[0];
  discard.push(removed);

  const veto = fScore === 5 ? 'VETO' : '';

  const updates = {};
  updates[`rooms/${roomId}/drawPolicyPile`] = pile;
  updates[`rooms/${roomId}/discardPolicyPile`] = discard;
  updates[`rooms/${roomId}/gameState`] = 'ChoosePolicy';
  updates[`rooms/${roomId}/gameElement`] = veto;

  await db.ref().update(updates);
}

async function submitChoosePolicy(roomId) {
  if (_selectedPolicyIdx === null) return;
  const idx = _selectedPolicyIdx;
  _selectedPolicyIdx = null;
  buzz();

  const snap = await db.ref('rooms/' + roomId).once('value');
  const room = snap.val();
  let pile = [...(room.drawPolicyPile || [])];
  let discard = [...(room.discardPolicyPile || [])];
  let fScore = room.fascistScore || 0;
  let lScore = room.liberalScore || 0;
  const players = getPlayerArray(room);

  // Record the chosen policy type before removing
  const chosen = pile[idx];

  // Score the chosen policy
  if (chosen === 'FASCIST') fScore++;
  else lScore++;

  // Pop both chancellor cards from end of pile into discard (matches original behavior)
  if (pile.length > 0) discard.push(pile.pop());
  if (pile.length > 0) discard.push(pile.pop());

  const updates = {};
  updates[`rooms/${roomId}/drawPolicyPile`] = pile;
  updates[`rooms/${roomId}/discardPolicyPile`] = discard;
  updates[`rooms/${roomId}/fascistScore`] = fScore;
  updates[`rooms/${roomId}/liberalScore`] = lScore;
  updates[`rooms/${roomId}/presidentVeto`] = false;
  updates[`rooms/${roomId}/chancellorVeto`] = false;

  if (lScore >= 5) {
    updates[`rooms/${roomId}/gameState`] = 'GameEndLIBERAL';
    await db.ref().update(updates);
    return;
  }
  if (fScore >= 6) {
    updates[`rooms/${roomId}/gameState`] = 'GameEndFASCIST';
    await db.ref().update(updates);
    return;
  }

  // Reshuffle if needed
  if (pile.length < 3) {
    pile = shuffle(shuffle(discard)).concat(pile);
    discard = [];
    updates[`rooms/${roomId}/drawPolicyPile`] = pile;
    updates[`rooms/${roomId}/discardPolicyPile`] = discard;
  }

  // Special action?
  if (chosen === 'FASCIST') {
    const special = checkSpecialAction(fScore, players.length);
    if (special) {
      updates[`rooms/${roomId}/gameState`] = special;
      await db.ref().update(updates);
      if (special === 'ChooseChancellor') playAudio('ChooseChancellor');
      return;
    }
  }

  setNextPresident(updates, roomId, room, '');
  updates[`rooms/${roomId}/gameState`] = 'ChooseChancellor';
  updates[`rooms/${roomId}/gameElement`] = '';

  await db.ref().update(updates);
  playAudio('ChooseChancellor');
}

async function submitVeto(roomId, role) {
  const key = role === 'PRESIDENT' ? 'presidentVeto' : 'chancellorVeto';
  const snap = await db.ref(`rooms/${roomId}/${key}`).once('value');
  const current = snap.val();
  const newVal = !current;
  await db.ref(`rooms/${roomId}/${key}`).set(newVal);

  // Check if both vetoed
  const roomSnap = await db.ref('rooms/' + roomId).once('value');
  const room = roomSnap.val();
  if (room.presidentVeto && room.chancellorVeto) {
    const updates = {};
    updates[`rooms/${roomId}/presidentVeto`] = false;
    updates[`rooms/${roomId}/chancellorVeto`] = false;
    updates[`rooms/${roomId}/gameState`] = 'ChooseChancellor';
    updates[`rooms/${roomId}/gameElement`] = '';
    setNextPresident(updates, roomId, room, '');
    await db.ref().update(updates);
    playAudio('ChooseChancellor');
  }
}

function showHostView() {
  const roomId = hostViewRoomId;
  app.innerHTML = '<div class="loader">Loading host view...</div>';

  const ref = db.ref('rooms/' + roomId);
  const cb = ref.on('value', snap => {
    if (!snap.exists()) {
      app.innerHTML = '<h1>Room not found</h1><a href="#lobby" style="color:var(--gold);">Back to lobby</a>';
      return;
    }
    renderHostScreen(roomId, snap.val());
  });
  activeListeners.push(() => ref.off('value', cb));
}

function renderHostScreen(roomId, room) {
  const gs = room.gameState || 'Login';
  const players = getPlayerArray(room);
  const fScore = room.fascistScore || 0;
  const lScore = room.liberalScore || 0;
  const pile = room.drawPolicyPile || [];
  const voteRetry = room.voteRetryCount || 0;

  let html = `<h1>${room.name || roomId}</h1>`;

  // Player list
  html += '<div class="host-board"><div class="host-players card">';
  html += '<h3>Players</h3><div class="flex-col gap-sm mt">';
  for (const p of players) {
    let badges = '';
    if (p.vip) badges += '<span class="badge badge-vip">VIP</span>';
    if (p.president) badges += '<span class="badge badge-pres">President</span>';
    if (p.chancellor) badges += '<span class="badge badge-chan">Chancellor</span>';
    if (p.inGameStatus === 'Dead') badges += '<span class="badge badge-dead">Dead</span>';

    let voteHtml = '';
    if (gs === 'VoteChancellor' && p.vote !== 'null' && p.vote) {
      voteHtml = `<span class="text-sm" style="color:${p.vote === 'ja' ? 'var(--liberal)' : 'var(--accent)'}">${p.vote.toUpperCase()}</span>`;
    }

    html += `<div class="player-row">
      <div class="name">${p.name}</div>
      <div class="badges">${badges} ${voteHtml}</div>
    </div>`;
  }
  html += '</div></div>';

  // Game area
  html += '<div class="host-game card">';
  if (gs === 'Login') {
    html += `<div class="text-center"><img src="${IMG}Logo.png" style="max-width:400px;width:100%;"><div class="text-dim mt">Waiting for players... (${players.length})</div></div>`;
  } else {
    // Scores
    html += '<div class="flex gap-lg flex-center mb">';
    html += '<div><strong class="text-red">Fascist</strong><div class="score-bar mt">';
    for (let i = 0; i < 6; i++) html += `<div class="score-dot ${i < fScore ? 'filled-f' : ''}">${i + 1}</div>`;
    html += '</div></div>';
    html += '<div><strong class="text-blue">Liberal</strong><div class="score-bar mt">';
    for (let i = 0; i < 5; i++) html += `<div class="score-dot ${i < lScore ? 'filled-l' : ''}">${i + 1}</div>`;
    html += '</div></div>';
    html += '</div>';

    html += `<div class="text-dim text-center text-sm">Draw pile: ${pile.length} · Vote fails: ${voteRetry}/3</div>`;

    // State info
    const stateMessages = {
      'ChooseChancellor': 'President is choosing Chancellor',
      'VoteChancellor': 'Voting for Chancellor: ' + (room.toBeChancellorName || ''),
      'RemovePolicy': 'President is removing a policy',
      'ChoosePolicy': 'Chancellor is choosing a policy',
      'ExaminPolicy': 'President is examining top 3 policies',
      'ChooseExaminPlayer': 'President is choosing a player to investigate',
      'ExaminPlayer': 'President is investigating ' + (room.gameElement || ''),
      'ChooseKillPlayer': 'President is choosing a player to execute',
      'ChoosePresidentPlayer': 'President is choosing the next president',
      'GameEndLIBERAL': 'LIBERALS WIN!',
      'GameEndFASCIST': 'FASCISTS WIN!'
    };
    html += `<h2 class="mt" style="color:${gs.includes('FASCIST') ? 'var(--accent)' : gs.includes('LIBERAL') ? 'var(--liberal)' : 'var(--gold)'}">${stateMessages[gs] || gs}</h2>`;

    if (gs === 'GameEndFASCIST' || gs === 'GameEndLIBERAL') {
      html += '<div class="flex-col gap-sm mt">';
      for (const p of players) {
        const cls = p.identity === 'Liberal' ? 'badge-liberal' : (p.identity === 'Hitler' ? 'badge-hitler' : 'badge-fascist');
        html += `<div class="player-row"><div class="name">${p.name}</div><span class="badge ${cls}">${p.identity}</span></div>`;
      }
      html += '</div>';
    }
  }
  html += '</div></div>';

  // Mute button
  html += `<button class="btn btn-sm btn-secondary" onclick="toggleMute()" id="muteBtn" style="align-self:center;">${audioMuted ? '🔇 Unmute' : '🔊 Mute'}</button>`;

  app.innerHTML = html;
}

function showAdmin() {
  app.innerHTML = `
    <h1>Admin Panel</h1>
    <div class="flex gap-sm mb">
      <button class="btn btn-secondary" onclick="location.hash='#lobby'">Back to Lobby</button>
    </div>
    <div class="card mb">
      <h3>Rooms</h3>
      <div id="adminRooms" class="loader">Loading...</div>
    </div>
    <div class="card mb">
      <h3>Players (PCIDs)</h3>
      <div class="flex gap-sm mb">
        <input type="text" id="newPcidName" placeholder="Name for new player" style="flex:1;">
        <button class="btn btn-green btn-sm" onclick="adminCreatePcid()">Create PCID</button>
      </div>
      <div id="adminPlayers" class="loader">Loading...</div>
    </div>`;

  // Rooms listener
  const roomRef = db.ref('rooms');
  const roomCb = roomRef.on('value', snap => {
    const rooms = snap.val() || {};
    const container = document.getElementById('adminRooms');
    if (!container) return;

    if (Object.keys(rooms).length === 0) {
      container.innerHTML = '<div class="text-dim">No rooms</div>';
      return;
    }

    let html = '<table class="admin-table"><tr><th>ID</th><th>Name</th><th>State</th><th>Players</th><th>Actions</th></tr>';
    for (const [id, room] of Object.entries(rooms)) {
      const count = room.players ? Object.keys(room.players).length : 0;
      html += `<tr>
        <td class="text-sm">${id}</td>
        <td>${room.name || '-'}</td>
        <td>${room.gameState || '-'}</td>
        <td>${count}</td>
        <td class="flex gap-sm">
          <button class="btn btn-sm btn-secondary" onclick="adminRenameRoom('${id}')">Rename</button>
          <button class="btn btn-sm btn-danger" onclick="adminDeleteRoom('${id}')">Delete</button>
          <button class="btn btn-sm btn-ghost" onclick="adminResetRoom('${id}')">Reset</button>
        </td>
      </tr>`;
    }
    html += '</table>';
    container.innerHTML = html;
  });
  activeListeners.push(() => roomRef.off('value', roomCb));

  // Players listener
  const playerRef = db.ref('players');
  const playerCb = playerRef.on('value', snap => {
    const players = snap.val() || {};
    const container = document.getElementById('adminPlayers');
    if (!container) return;

    if (Object.keys(players).length === 0) {
      container.innerHTML = '<div class="text-dim">No players</div>';
      return;
    }

    let html = '<table class="admin-table"><tr><th>PCID</th><th>Name</th><th>Actions</th></tr>';
    for (const [pcid, data] of Object.entries(players)) {
      html += `<tr>
        <td class="text-sm">${pcid}${pcid === myPCID ? ' (You)' : ''}</td>
        <td>${data.name || '-'}</td>
        <td class="flex gap-sm">
          <button class="btn btn-sm btn-secondary" onclick="adminRenamePlayer('${pcid}')">Rename</button>
          <button class="btn btn-sm btn-danger" onclick="adminDeletePlayer('${pcid}')">Delete</button>
        </td>
      </tr>`;
    }
    html += '</table>';
    container.innerHTML = html;
  });
  activeListeners.push(() => playerRef.off('value', playerCb));
}

async function adminRenameRoom(roomId) {
  const name = prompt('New room name:');
  if (name) await db.ref('rooms/' + roomId + '/name').set(name.trim());
}

async function adminDeleteRoom(roomId) {
  if (confirm('Delete room ' + roomId + '?')) await db.ref('rooms/' + roomId).remove();
}

async function adminResetRoom(roomId) {
  if (!confirm('Reset room ' + roomId + ' to Login state?')) return;
  const updates = {};
  updates[`rooms/${roomId}/gameState`] = 'Login';
  updates[`rooms/${roomId}/fascistScore`] = 0;
  updates[`rooms/${roomId}/liberalScore`] = 0;
  updates[`rooms/${roomId}/voteRetryCount`] = 1;
  updates[`rooms/${roomId}/toBeChancellorName`] = '';
  updates[`rooms/${roomId}/gameElement`] = '';
  updates[`rooms/${roomId}/presidentVeto`] = false;
  updates[`rooms/${roomId}/chancellorVeto`] = false;
  updates[`rooms/${roomId}/drawPolicyPile`] = createDrawPolicyPile();
  updates[`rooms/${roomId}/discardPolicyPile`] = [];
  updates[`rooms/${roomId}/playerOrder`] = [];
  updates[`rooms/${roomId}/players`] = null;
  await db.ref().update(updates);
}

async function adminRenamePlayer(pcid) {
  const name = prompt('New name for ' + pcid + ':');
  if (!name) return;
  await db.ref('players/' + pcid + '/name').set(name.trim());

  // Update in rooms too
  const snap = await db.ref('rooms').once('value');
  const rooms = snap.val() || {};
  const updates = {};
  for (const [rid, room] of Object.entries(rooms)) {
    if (room.players && room.players[pcid]) {
      updates[`rooms/${rid}/players/${pcid}/name`] = name.trim();
    }
  }
  if (Object.keys(updates).length > 0) await db.ref().update(updates);
}

async function adminDeletePlayer(pcid) {
  if (!confirm('Delete player ' + pcid + '?')) return;
  await db.ref('players/' + pcid).remove();

  // Remove from rooms
  const snap = await db.ref('rooms').once('value');
  const rooms = snap.val() || {};
  const updates = {};
  for (const [rid, room] of Object.entries(rooms)) {
    if (room.players && room.players[pcid]) {
      updates[`rooms/${rid}/players/${pcid}`] = null;
      const order = (room.playerOrder || []).filter(p => p !== pcid);
      updates[`rooms/${rid}/playerOrder`] = order;
    }
  }
  if (Object.keys(updates).length > 0) await db.ref().update(updates);
}

async function adminCreatePcid() {
  const nameInput = document.getElementById('newPcidName');
  const name = (nameInput.value || '').trim();
  if (!name) return toast('Enter a name first');

  const newPcid = Array.from({ length: 12 }, () =>
    'ABCDEFGHIJKLMNOPQRSTUVWXYZ'[Math.floor(Math.random() * 26)]
  ).join('');

  await db.ref('players/' + newPcid).set({ name, createdAt: Date.now() });
  nameInput.value = '';
  toast('Created PCID: ' + newPcid);
}
